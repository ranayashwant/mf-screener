<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MF Screener — Complete Blueprint Mind Map</title>
<!-- NOTE: This mind map structure was generated using AI to visualize the project architecture. -->
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
<style>
:root {
  --bg:#070b09;--bg2:#0d1410;--bg3:#131c17;--bg-hover:#1a2922;
  --fg:#e4ece7;--fg2:#a3b5ab;--fg3:#5e7368;
  --accent:#10b981;--accent2:#34d399;--accent-dim:rgba(16,185,129,.12);
  --amber:#f59e0b;--red:#ef4444;--violet:#8b5cf6;--cyan:#06b6d4;
  --pink:#ec4899;--orange:#f97316;--lime:#84cc16;--sky:#38bdf8;
  --border:#162019;--line:#1c2e24;
  --radius:10px;
}
*{margin:0;padding:0;box-sizing:border-box;}
html{scroll-behavior:smooth;}
body{font-family:'Space Grotesk',sans-serif;background:var(--bg);color:var(--fg);min-height:100vh;overflow-x:hidden;}
body::before{content:'';position:fixed;inset:0;background:radial-gradient(ellipse at 15% 50%,rgba(16,185,129,.06)0%,transparent 55%),radial-gradient(ellipse at 85% 15%,rgba(245,158,11,.04)0%,transparent 50%),radial-gradient(ellipse at 50% 85%,rgba(6,182,212,.04)0%,transparent 50%);pointer-events:none;z-index:0;}
body::after{content:'';position:fixed;inset:0;background-image:linear-gradient(rgba(16,185,129,.025) 1px,transparent 1px),linear-gradient(90deg,rgba(16,185,129,.025) 1px,transparent 1px);background-size:48px 48px;pointer-events:none;z-index:0;}

/* Scrollbar */
::-webkit-scrollbar{width:6px;height:6px;}
::-webkit-scrollbar-track{background:var(--bg2);}
::-webkit-scrollbar-thumb{background:var(--fg3);border-radius:3px;}
::-webkit-scrollbar-thumb:hover{background:var(--fg2);}

/* Header */
.header{position:sticky;top:0;z-index:100;background:rgba(7,11,9,.85);backdrop-filter:blur(20px);border-bottom:1px solid var(--border);padding:0 24px;}
.header-inner{max-width:1400px;margin:0 auto;display:flex;align-items:center;gap:16px;height:64px;}
.logo{display:flex;align-items:center;gap:10px;font-weight:700;font-size:18px;white-space:nowrap;color:var(--accent2);}
.logo i{font-size:22px;}
.logo span{color:var(--fg3);font-weight:400;font-size:13px;margin-left:4px;}

/* Tab Navigation */
.tabs{display:flex;gap:2px;overflow-x:auto;flex:1;padding:4px 0;scrollbar-width:none;}
.tabs::-webkit-scrollbar{display:none;}
.tab-btn{padding:8px 16px;border:none;background:transparent;color:var(--fg3);font-family:inherit;font-size:13px;font-weight:500;cursor:pointer;white-space:nowrap;border-radius:8px;transition:all .2s;position:relative;}
.tab-btn:hover{color:var(--fg2);background:var(--bg3);}
.tab-btn.active{color:var(--accent2);background:var(--accent-dim);}
.tab-btn .tab-dot{display:inline-block;width:6px;height:6px;border-radius:50%;margin-right:6px;vertical-align:middle;}

/* Controls */
.controls{display:flex;align-items:center;gap:8px;flex-shrink:0;}
.ctrl-btn{width:36px;height:36px;border:1px solid var(--border);background:var(--bg2);color:var(--fg3);border-radius:8px;cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:13px;transition:all .2s;}
.ctrl-btn:hover{border-color:var(--accent);color:var(--accent);background:var(--accent-dim);}
.ctrl-btn.active{border-color:var(--accent);color:var(--accent);background:var(--accent-dim);}

/* Search */
.search-wrap{position:relative;}
.search-wrap input{width:200px;height:36px;padding:0 12px 0 32px;border:1px solid var(--border);background:var(--bg2);color:var(--fg);border-radius:8px;font-family:inherit;font-size:13px;outline:none;transition:all .2s;}
.search-wrap input:focus{border-color:var(--accent);background:var(--bg3);width:260px;}
.search-wrap input::placeholder{color:var(--fg3);}
.search-wrap i{position:absolute;left:10px;top:50%;transform:translateY(-50%);color:var(--fg3);font-size:12px;}

/* Main Content */
.main{position:relative;z-index:1;max-width:1400px;margin:0 auto;padding:24px;}

/* Mind Map Container */
.map-container{display:none;animation:fadeUp .35s ease;}
.map-container.active{display:block;}
@keyframes fadeUp{from{opacity:0;transform:translateY(12px);}to{opacity:1;transform:translateY(0);}}

/* Root Node */
.root-node{display:inline-flex;align-items:center;gap:14px;padding:20px 32px;background:linear-gradient(135deg,var(--bg3),var(--bg2));border:1.5px solid var(--accent);border-radius:16px;margin-bottom:24px;box-shadow:0 0 40px rgba(16,185,129,.1),inset 0 1px 0 rgba(255,255,255,.03);}
.root-node i{font-size:28px;color:var(--accent);}
.root-node .root-label{font-size:22px;font-weight:700;letter-spacing:-.3px;}
.root-node .root-sub{font-size:13px;color:var(--fg3);margin-top:2px;}

/* Branches Container */
.branches{display:grid;grid-template-columns:repeat(auto-fill,minmax(420px,1fr));gap:16px;}
@media(max-width:900px){.branches{grid-template-columns:1fr;}}

/* Branch */
.branch{border-radius:var(--radius);overflow:hidden;border:1px solid var(--border);background:var(--bg2);transition:border-color .2s;}
.branch:hover{border-color:color-mix(in srgb,var(--branch-color) 40%,transparent);}
.branch-header{display:flex;align-items:center;gap:10px;padding:14px 16px;cursor:pointer;user-select:none;transition:background .15s;}
.branch-header:hover{background:var(--bg-hover);}
.branch-dot{width:10px;height:10px;border-radius:50%;background:var(--branch-color);flex-shrink:0;box-shadow:0 0 8px color-mix(in srgb,var(--branch-color) 40%,transparent);}
.branch-icon{width:32px;height:32px;border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:14px;flex-shrink:0;background:color-mix(in srgb,var(--branch-color) 12%,transparent);color:var(--branch-color);}
.branch-title{flex:1;font-weight:600;font-size:14px;}
.branch-count{font-size:11px;color:var(--fg3);background:var(--bg);padding:2px 8px;border-radius:10px;}
.branch-chevron{color:var(--fg3);font-size:11px;transition:transform .25s;}
.branch.collapsed .branch-chevron{transform:rotate(-90deg);}
.branch-body{padding:0 16px 16px;display:grid;gap:0;transition:all .25s;}
.branch.collapsed .branch-body{display:none;}

/* Tree Nodes */
.tree-node{position:relative;}
.tree-children{margin-left:16px;padding-left:16px;border-left:2px solid color-mix(in srgb,var(--branch-color) 25%,transparent);}
.tree-item{padding:6px 0 6px 4px;display:flex;align-items:flex-start;gap:8px;cursor:default;transition:background .15s;border-radius:6px;margin:0 -4px;padding-right:4px;}
.tree-item:hover{background:var(--bg-hover);}
.tree-item.has-children{cursor:pointer;}
.tree-item .toggle-icon{width:18px;height:18px;display:flex;align-items:center;justify-content:center;font-size:9px;color:var(--fg3);flex-shrink:0;margin-top:2px;transition:transform .2s;}
.tree-item.has-children.collapsed .toggle-icon{transform:rotate(-90deg);}
.tree-item .node-icon{width:20px;height:20px;display:flex;align-items:center;justify-content:center;font-size:11px;flex-shrink:0;margin-top:1px;}
.tree-item .node-label{font-size:13px;line-height:1.5;flex:1;}
.tree-item .node-label strong{font-weight:600;color:var(--fg);}
.tree-item .node-badge{font-size:10px;padding:1px 7px;border-radius:6px;font-weight:500;white-space:nowrap;margin-top:2px;}
.tree-item .node-badge.green{background:rgba(16,185,129,.15);color:#34d399;}
.tree-item .node-badge.amber{background:rgba(245,158,11,.15);color:#fbbf24;}
.tree-item .node-badge.red{background:rgba(239,68,68,.15);color:#f87171;}
.tree-item .node-badge.blue{background:rgba(56,189,248,.15);color:#38bdf8;}
.tree-item .node-badge.violet{background:rgba(139,92,246,.15);color:#a78bfa;}
.tree-item .node-children{margin-left:14px;padding-left:14px;border-left:2px solid color-mix(in srgb,var(--branch-color) 18%,transparent);overflow:hidden;transition:max-height .3s ease,opacity .2s;}
.tree-item.collapsed .node-children{max-height:0!important;opacity:0;}

/* Code Block */
.code-block{margin:6px 0 2px 26px;padding:12px 16px;background:#0a0e0c;border:1px solid var(--border);border-radius:8px;font-family:'JetBrains Mono',monospace;font-size:11.5px;line-height:1.7;color:var(--fg2);overflow-x:auto;white-space:pre;}
.code-block .kw{color:#c084fc;}
.code-block .fn{color:#38bdf8;}
.code-block .str{color:#34d399;}
.code-block .num{color:#fbbf24;}
.code-block .cm{color:#4a6356;font-style:italic;}
.code-block .op{color:#f87171;}

/* Status Checkbox (Roadmap) */
.status-check{width:16px;height:16px;border-radius:4px;border:1.5px solid var(--fg3);flex-shrink:0;margin-top:3px;display:flex;align-items:center;justify-content:center;font-size:9px;transition:all .15s;}
.status-check.done{background:var(--accent);border-color:var(--accent);color:#fff;}
.status-check.pending{border-color:var(--fg3);color:transparent;}

/* Schema Table */
.schema-table{margin:4px 0 4px 26px;border:1px solid var(--border);border-radius:8px;overflow:hidden;font-size:12px;width:calc(100% - 26px);}
.schema-table table{width:100%;border-collapse:collapse;}
.schema-table th{text-align:left;padding:8px 12px;background:var(--bg3);color:var(--fg3);font-weight:600;font-size:11px;text-transform:uppercase;letter-spacing:.5px;border-bottom:1px solid var(--border);}
.schema-table td{padding:7px 12px;border-bottom:1px solid var(--border);color:var(--fg2);}
.schema-table tr:last-child td{border-bottom:none;}
.schema-table .col-name{color:var(--accent2);font-family:'JetBrains Mono',monospace;font-size:11.5px;}
.schema-table .col-type{color:var(--amber);font-family:'JetBrains Mono',monospace;font-size:11px;}
.schema-table .col-constraint{font-size:10px;}
.schema-table .pk{color:#f87171;}
.schema-table .fk{color:#38bdf8;}
.schema-table .uq{color:#a78bfa;}
.schema-table .df{color:var(--fg3);}

/* Endpoint Block */
.endpoint{margin:4px 0 4px 26px;padding:10px 14px;background:var(--bg);border:1px solid var(--border);border-radius:8px;}
.endpoint-method{display:inline-block;padding:2px 8px;border-radius:4px;font-size:10px;font-weight:700;font-family:'JetBrains Mono',monospace;margin-right:8px;}
.endpoint-method.get{background:rgba(16,185,129,.15);color:#34d399;}
.endpoint-method.post{background:rgba(245,158,11,.15);color:#fbbf24;}
.endpoint-method.delete{background:rgba(239,68,68,.15);color:#f87171;}
.endpoint-path{font-family:'JetBrains Mono',monospace;font-size:12px;color:var(--fg);}
.endpoint-desc{font-size:12px;color:var(--fg3);margin-top:4px;}
.endpoint-params{margin-top:6px;display:flex;flex-wrap:wrap;gap:4px;}
.endpoint-params span{font-size:10px;padding:2px 8px;border-radius:4px;background:var(--bg3);color:var(--fg2);font-family:'JetBrains Mono',monospace;}

/* File Tree */
.file-tree{margin:4px 0 4px 26px;}
.file-item{display:flex;align-items:center;gap:8px;padding:4px 8px;border-radius:4px;font-size:12.5px;font-family:'JetBrains Mono',monospace;color:var(--fg2);}
.file-item:hover{background:var(--bg-hover);}
.file-item i{width:16px;text-align:center;font-size:12px;}
.file-item .fi-folder{color:var(--amber);}
.file-item .fi-file{color:var(--fg3);}
.file-item .fi-js{color:#fbbf24;}
.file-item .fi-html{color:#f87171;}
.file-item .fi-css{color:#38bdf8;}
.file-item .fi-env{color:var(--fg3);}
.file-item .fi-git{color:#f87171;}
.file-item .fi-json{color:#34d399;}
.file-item .fi-sql{color:#c084fc;}
.file-indent{padding-left:24px;}

/* Stats Bar */
.stats-bar{display:flex;gap:16px;padding:16px 20px;background:var(--bg2);border:1px solid var(--border);border-radius:12px;margin-bottom:24px;flex-wrap:wrap;}
.stat-item{display:flex;align-items:center;gap:8px;}
.stat-num{font-size:22px;font-weight:700;font-family:'JetBrains Mono',monospace;}
.stat-label{font-size:12px;color:var(--fg3);}
.stat-divider{width:1px;background:var(--border);margin:0 4px;}

/* Highlight matched */
.search-match{background:rgba(245,158,11,.25);border-radius:2px;padding:0 1px;}
.search-hidden{display:none!important;}

/* Empty state */
.empty-state{text-align:center;padding:60px 20px;color:var(--fg3);}
.empty-state i{font-size:40px;margin-bottom:12px;opacity:.3;}
.empty-state p{font-size:14px;}

/* Floating particles */
.particle{position:fixed;width:2px;height:2px;background:var(--accent);border-radius:50%;pointer-events:none;z-index:0;opacity:0;animation:particleFloat linear infinite;}
@keyframes particleFloat{0%{opacity:0;transform:translateY(100vh);}10%{opacity:.4;}90%{opacity:.4;}100%{opacity:0;transform:translateY(-20px);}}

/* Tooltip */
[data-tip]{position:relative;}
[data-tip]:hover::after{content:attr(data-tip);position:absolute;bottom:calc(100% + 6px);left:50%;transform:translateX(-50%);padding:4px 10px;background:#1a2922;border:1px solid var(--border);border-radius:6px;font-size:11px;color:var(--fg2);white-space:nowrap;z-index:200;pointer-events:none;animation:fadeUp .15s ease;}

/* Print */
@media print{.header{position:relative;}.particle{display:none;}}
</style>
</head>
<body>

<!-- Floating Particles -->
<div id="particles"></div>

<!-- Header -->
<header class="header">
  <div class="header-inner">
    <div class="logo">
      <i class="fa-solid fa-diagram-project"></i>
      MF Screener
      <span>Blueprint</span>
    </div>
    <nav class="tabs" id="tabNav"></nav>
    <div class="controls">
      <div class="search-wrap">
        <i class="fa-solid fa-magnifying-glass"></i>
        <input type="text" id="searchInput" placeholder="Search nodes..." autocomplete="off">
      </div>
      <button class="ctrl-btn" id="expandAll" data-tip="Expand All" title="Expand All"><i class="fa-solid fa-expand"></i></button>
      <button class="ctrl-btn" id="collapseAll" data-tip="Collapse All" title="Collapse All"><i class="fa-solid fa-compress"></i></button>
    </div>
  </div>
</header>

<!-- Main -->
<main class="main" id="mainContent"></main>

// ─── State ───
let activeTab = 'blueprint';

// ─── Render Tabs ───
function renderTabs() {
  const nav = document.getElementById('tabNav');
  nav.innerHTML = TABS.map(t =>

    btn.addEventListener('click', () => {

// ─── Render Content ───
function renderContent() {
  const main = document.getElementById('mainContent');
  const data = MIND_MAPS[activeTab];
  if (!data) return;

  let html = `<div class="map-container active">`;

  // Root Node
  html += `<div class="root-node">
    <i class="${data.root.icon}"></i>
    <div>
      <div class="root-label">${data.root.label}</div>
      <div class="root-sub">${data.root.sub}</div>
    </div>
  </div>`;

  // Stats Bar
  if (data.stats && data.stats.length) {
    html += `<div class="stats-bar">`;
    data.stats.forEach((s, i) => {
      if (i > 0) html += `<div class="stat-divider"></div>`;
      const cls = s.cls || '';
      const color = cls === 'green' ? 'var(--accent)' : cls === 'amber' ? 'var(--amber)' : cls === 'violet' ? 'var(--violet)' : 'var(--fg)';
      html += `<div class="stat-item">
        <span class="stat-num" style="color:${color}">${s.num}</span>
        <span class="stat-label">${s.label}</span>
      </div>`;
    });
    html += `</div>`;
  }

  // Branches
  html += `<div class="branches">`;
  data.branches.forEach((branch, bi) => {
    const color = branch.color || COLORS[bi % COLORS.length];
    const childCount = countDescendants(branch);
    html += `<div class="branch" style="--branch-color:${color}" data-branch="${bi}">`;
    html += `<div class="branch-header" onclick="toggleBranch(this)">
      <div class="branch-dot"></div>
      <div class="branch-icon"><i class="${branch.icon}"></i></div>
      <span class="branch-title">${branch.label}</span>
      <span class="branch-count">${childCount}</span>
      <i class="fa-solid fa-chevron-down branch-chevron"></i>
    </div>`;
    html += `<div class="branch-body">`;

    // Handle different branch types
    if (branch.type === 'files') {
      html += renderFileTree(branch.files, color);
    } else if (branch.type === 'schema' && branch.schema) {
      html += renderSchemaTable(branch.schema, color);
      html += renderTreeChildren(branch.children || [], color);
    } else {
      html += renderTreeChildren(branch.children || [], color);
    }

    html += `</div></div>`;
  });
  html += `</div></div>`;
  main.innerHTML = html;

  // Apply search
  if (searchTerm) applySearch(searchTerm);
}

// ─── Count descendants ───
function countDescendants(node) {
  if (node.type === 'files') return countFiles(node.files);
  let count = 0;
  const children = node.children || [];
  children.forEach(c => {
    count++;
    if (c.children) count += countDescendants(c);
  });
  return count;
}
function countFiles(files) {
  let c = 0;
  files.forEach(f => { c++; if (f.children) c += countFiles(f.children); });
  return c;
}

// ─── Render Tree Children ───
function renderTreeChildren(children, color) {
  if (!children || !children.length) return '';
  let html = `<div class="tree-children" style="--branch-color:${color}">`;
  children.forEach(child => {
    if (child.type === 'code') {
      html += `<div class="tree-node"><div class="code-block">${child.code}</div></div>`;
    } else if (child.type === 'endpoint') {
      html += renderEndpoint(child);
    } else {
      const hasChildren = child.children && child.children.length > 0;
      const statusHtml = child.status ? `<div class="status-check ${child.status}"><i class="fa-solid fa-check"></i></div>` : '';
      const iconHtml = child.icon ? `<div class="node-icon" style="color:${color}"><i class="${child.icon}"></i></div>` : '';
      const badgeHtml = child.badge ? `<span class="node-badge ${child.badge.cls}">${child.badge.text}</span>` : '';
      const toggleHtml = hasChildren ? `<div class="toggle-icon"><i class="fa-solid fa-chevron-down"></i></div>` : '';

      html += `<div class="tree-node">
        <div class="tree-item${hasChildren?' has-children':''}" data-label="${(child.label||'').replace(/<[^>]*>/g,'')}" onclick="${hasChildren?'toggleTreeNode(this)':''}">
          ${statusHtml}${toggleHtml}${iconHtml}
          <span class="node-label">${child.label}</span>
          ${badgeHtml}
        </div>`;
      if (hasChildren) {
        html += `<div class="node-children" style="--branch-color:${color}">`;
        html += renderTreeChildren(child.children, color);
        html += `</div>`;
      }
      html += `</div>`;
    }
  });
  html += `</div>`;
  return html;
}

// ─── Render File Tree ───
function renderFileTree(files, color) {
  let html = `<div class="file-tree">`;
  files.forEach(f => {
    const isFolder = !!f.children;
    const iconCls = isFolder ? 'fi-folder' : (f.cls || 'fi-file');
    const desc = f.desc ? ` <span style="color:var(--fg3);font-family:'Space Grotesk',sans-serif;font-size:11px;">— ${f.desc}</span>` : '';
    html += `<div class="file-item" data-label="${f.name}"><i class="${f.icon} ${iconCls}"></i><span>${f.name}</span>${desc}</div>`;
    if (f.children) {
      html += `<div class="file-indent">${renderFileTree(f.children, color)}</div>`;
    }
  });
  html += `</div>`;
  return html;
}

// ─── Render Schema Table ───
function renderSchemaTable(schema, color) {
  let html = `<div class="schema-table"><table><thead><tr>
    <th>Column</th><th>Type</th><th>Constraints</th>
  </tr></thead><tbody>`;
  schema.cols.forEach(col => {
    const constraintsHtml = col.constraints.map(c => {
      if (c === 'PK') return `<span class="pk">PK</span>`;
      if (c.startsWith('FK')) return `<span class="fk">FK</span>`;
      if (c === 'UNIQUE') return `<span class="uq">UQ</span>`;
      if (c === 'AUTO_INCREMENT') return `<span class="df">AUTO_INC</span>`;
      return `<span class="df">${c}</span>`;
    }).join(' ');
    html += `<tr>
      <td class="col-name">${col.name}</td>
      <td class="col-type">${col.type}</td>
      <td class="col-constraint">${constraintsHtml}</td>
    </tr>`;
  });
  html += `</tbody></table></div>`;
  if (schema.unique) {
    html += `<div style="margin:4px 0 4px 26px;font-size:11px;color:var(--fg3);font-family:'JetBrains Mono',monospace;">${schema.unique}</div>`;
  }
  return html;
}

// ─── Render Endpoint ───
function renderEndpoint(child) {
  const paramsHtml = child.params ? `<div class="endpoint-params">${child.params.map(p=>`<span>${p}</span>`).join('')}</div>` : '';
  return `<div class="tree-node"><div class="endpoint" data-label="${child.path}">
    <span class="endpoint-method ${child.method.toLowerCase()}">${child.method}</span>
    <span class="endpoint-path">${child.path}</span>

// ─── Toggle Tree Node ───
function toggleTreeNode(item) {
  item.classList.toggle('collapsed');
  const children = item.nextElementSibling;
  if (children && children.classList.contains('node-children')) {
    if (item.classList.contains('collapsed')) {
      children.style.maxHeight = '0';
    } else {
      children.style.maxHeight = children.scrollHeight + 'px';
      setTimeout(() => { children.style.maxHeight = 'none'; }, 300);

}

// ─── Search ───
document.getElementById('searchInput').addEventListener('input', (e) => {
  searchTerm = e.target.value.trim().toLowerCase();
  applySearch(searchTerm);
});

function applySearch(term) {
  if (!term) {
    // Remove all search-related classes
    document.querySelectorAll('.search-hidden').forEach(el => el.classList.remove('search-hidden'));
    document.querySelectorAll('.search-match').forEach(el => {
      el.outerHTML = el.textContent;
    });
    return;
  }

  // First, restore all original text
  document.querySelectorAll('.search-match').forEach(el => {
    el.outerHTML = el.textContent;
  });

  // Search in all label-bearing elements
  const items = document.querySelectorAll('[data-label]');
  const branchHeaders = document.querySelectorAll('.branch-header');
  const branches = document.querySelectorAll('.branch');

  items.forEach(item => {
    const text = (item.getAttribute('data-label') || '').toLowerCase();
    if (text.includes(term)) {
      item.classList.remove('search-hidden');
      // Highlight match
      const labelEl = item.querySelector('.node-label') || item;
      if (labelEl && labelEl !== item) {
        const original = labelEl.innerHTML;
        const textOnly = item.getAttribute('data-label');
        const regex = new RegExp(`(${escapeRegex(textOnly)})`, 'gi');
        // Only highlight in the text node, preserve HTML
        highlightInElement(labelEl, term);
      }
      // Expand parents
      expandParents(item);
    } else {
      // Only hide if it's a leaf node with no visible children
      const childItems = item.querySelectorAll('[data-label]');
      let hasVisibleChild = false;
      childItems.forEach(ci => {
        if ((ci.getAttribute('data-label')||'').toLowerCase().includes(term)) hasVisibleChild = true;
      });
      if (!hasVisibleChild) {
        item.closest('.tree-node')?.classList.add('search-hidden');
      }
    }
  });

  // Show/hide branches based on whether they have visible content
  branches.forEach(branch => {
    const hiddenNodes = branch.querySelectorAll('.tree-node.search-hidden');
    const totalNodes = branch.querySelectorAll('.tree-node');
    if (hiddenNodes.length === totalNodes.length && totalNodes.length > 0) {
      branch.classList.add('search-hidden');
    } else {
      branch.classList.remove('search-hidden');
      branch.classList.remove('collapsed'); // expand visible branches
    }
  });
}

function expandParents(el) {
  let current = el.closest('.node-children');
  while (current) {
    current.style.maxHeight = 'none';
    const sibling = current.previousElementSibling;
    if (sibling) sibling.classList.remove('collapsed');
    current = current.parentElement?.closest('.node-children');
  }
  // Also expand branch
  const branch = el.closest('.branch');
  if (branch) branch.classList.remove('collapsed');
}

function highlightInElement(el, term) {
  const walker = document.createTreeWalker(el, NodeFilter.SHOW_TEXT);
  const textNodes = [];
  while (walker.nextNode()) textNodes.push(walker.currentNode);
  textNodes.forEach(node => {
    const idx = node.textContent.toLowerCase().indexOf(term);
    if (idx >= 0) {
      const span = document.createElement('span');
      span.className = 'search-match';
      const before = node.textContent.slice(0, idx);
      const match = node.textContent.slice(idx, idx + term.length);
      const after = node.textContent.slice(idx + term.length);
      span.textContent = match;
      const parent = node.parentNode;
      if (before) parent.insertBefore(document.createTextNode(before), node);
      parent.insertBefore(span, node);
      if (after) parent.insertBefore(document.createTextNode(after), node);
      parent.removeChild(node);
    }
  });
}

function escapeRegex(str) {
  return str.replace(/[.*+?^${}()|[\]\\]/g, '\\$&');
}

// ─── Floating Particles ───
function createParticles() {
  const container = document.getElementById('particles');
  const prefersReduced = window.matchMedia('(prefers-reduced-motion: reduce)').matches;
  if (prefersReduced) return;
  for (let i = 0; i < 15; i++) {
    const p = document.createElement('div');
    p.className = 'particle';
    p.style.left = Math.random() * 100 + '%';
    p.style.animationDuration = (12 + Math.random() * 20) + 's';
    p.style.animationDelay = (Math.random() * 15) + 's';
    p.style.width = p.style.height = (1 + Math.random() * 2) + 'px';
    container.appendChild(p);
  }
}

// ─── Init ───
renderTabs();
renderContent();
createParticles();
</script>
